<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="4;url=https://find-my-saas.com">
  <title>Redirecting</title>
  <style>
    body {
      position: relative;
      min-height: 100vh;
      background: linear-gradient(180deg, #ffffff 0%, #fbfdff 48%, #fffdfd 100%);
      animation: page-breathe 8s ease-in-out infinite;
    }

    .footer-note {
      position: fixed;
      right: 16px;
      bottom: 12px;
      color: rgba(0, 0, 0, 0.12);
      font-size: 0.9rem;
      white-space: nowrap;
      pointer-events: none;
    }

    .glitter {
      position: relative;
      display: inline-block;
      font-weight: 700;
      z-index: 0;
      color: #1f66a8;
      text-shadow:
        0 0 2px rgba(255, 255, 255, 0.9),
        0 0 8px rgba(153, 223, 255, 0.95),
        0 0 14px rgba(84, 196, 255, 0.75);
    }

    .glitter .route {
      position: absolute;
      left: -3%;
      right: -4%;
      top: 50%;
      height: 1.9em;
      border-radius: 999px;
      pointer-events: none;
      z-index: -2;
      opacity: 0.95;
      filter: blur(7px);
      background-size: 220% 100%;
    }

    .glitter .route-a {
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.96) 0%, rgba(182, 236, 255, 0.92) 12%, rgba(138, 217, 252, 0.82) 26%, rgba(138, 217, 252, 0.1) 38%, rgba(199, 237, 250, 0.72) 58%, rgba(248, 205, 230, 0.5) 76%, rgba(248, 205, 230, 0.1) 90%, rgba(248, 205, 230, 0) 100%);
      animation: route-a-flow 2.4s ease-in-out infinite;
    }

    .glitter .route-b {
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.9) 0%, rgba(204, 241, 255, 0.88) 10%, rgba(154, 222, 252, 0.72) 22%, rgba(154, 222, 252, 0.08) 34%, rgba(249, 213, 236, 0.46) 64%, rgba(249, 213, 236, 0.1) 86%, rgba(249, 213, 236, 0) 100%);
      animation: route-b-flow 2.8s ease-in-out infinite;
    }

    .glitter::before,
    .glitter::after,
    .glitter i {
      content: "";
      position: absolute;
      left: -2%;
      right: -4%;
      pointer-events: none;
      z-index: -1;
    }

    .glitter::before,
    .glitter::after {
      top: 50%;
      height: 1.7em;
      transform: translateY(-50%);
      border-radius: 999px;
    }

    .glitter::before {
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.92) 0%, rgba(194, 238, 252, 0.9) 12%, rgba(151, 221, 247, 0.82) 24%, rgba(151, 221, 247, 0.22) 36%, rgba(197, 235, 247, 0.78) 54%, rgba(247, 207, 229, 0.54) 74%, rgba(247, 207, 229, 0.16) 88%, rgba(247, 207, 229, 0) 100%);
      background-size: 220% 100%;
      filter: blur(8px);
      opacity: 0.88;
      animation: trail-flow 2.5s ease-in-out infinite;
    }

    .glitter::after {
      background:
        radial-gradient(circle at 4% 54%, rgba(255, 255, 255, 1) 0 2px, transparent 3.4px),
        radial-gradient(circle at 8% 62%, rgba(255, 255, 255, 1) 0 1px, transparent 2px),
        radial-gradient(circle at 12% 46%, rgba(255, 255, 255, 1) 0 1.2px, transparent 2.2px),
        radial-gradient(circle at 16% 36%, rgba(255, 182, 228, 0.95) 0 2.4px, transparent 3.6px),
        radial-gradient(circle at 24% 56%, rgba(108, 197, 255, 0.95) 0 2.2px, transparent 3.5px),
        radial-gradient(circle at 34% 38%, rgba(255, 255, 255, 1) 0 1.2px, transparent 2.2px),
        radial-gradient(circle at 46% 65%, rgba(255, 180, 223, 0.95) 0 2.3px, transparent 3.5px),
        radial-gradient(circle at 57% 44%, rgba(255, 255, 255, 1) 0 1.2px, transparent 2.2px),
        radial-gradient(circle at 68% 58%, rgba(255, 255, 255, 1) 0 1.2px, transparent 2.2px),
        radial-gradient(circle at 82% 40%, rgba(187, 143, 255, 0.9) 0 2.2px, transparent 3.5px),
        radial-gradient(circle at 92% 60%, rgba(255, 255, 255, 1) 0 1.2px, transparent 2.2px);
      background-size: 180% 100%;
      filter: blur(0.2px);
      opacity: 0.8;
      animation: sparkles-flow 2s ease-in-out infinite;
    }

    .glitter i {
      top: 48%;
      height: 2em;
      transform: translateY(-50%);
      border-radius: 999px;
      background:
        radial-gradient(circle at 4% 52%, rgba(255, 255, 255, 1) 0 2.4px, transparent 4px),
        radial-gradient(circle at 8% 40%, rgba(121, 211, 255, 1) 0 3px, transparent 4.6px),
        radial-gradient(circle at 14% 52%, rgba(255, 255, 255, 1) 0 1.4px, transparent 2.6px),
        radial-gradient(circle at 36% 35%, rgba(255, 255, 255, 1) 0 1.4px, transparent 2.6px),
        radial-gradient(circle at 58% 62%, rgba(255, 255, 255, 1) 0 1.4px, transparent 2.6px),
        radial-gradient(circle at 74% 40%, rgba(255, 146, 215, 0.95) 0 2.8px, transparent 4px),
        radial-gradient(circle at 88% 58%, rgba(109, 196, 255, 0.95) 0 2.6px, transparent 4px);
      background-size: 160% 100%;
      filter: blur(0.1px);
      opacity: 0.88;
      animation: stars-flow 1.8s ease-in-out infinite;
    }

    @keyframes page-breathe {
      0%,
      100% {
        background: linear-gradient(180deg, #ffffff 0%, #fbfdff 48%, #fffdfd 100%);
      }
      50% {
        background: linear-gradient(180deg, #ffffff 0%, #fcfeff 48%, #fffefe 100%);
      }
    }

    @keyframes trail-flow {
      from {
        background-position: 160% 50%;
      }
      to {
        background-position: -40% 50%;
      }
    }

    @keyframes route-a-flow {
      0% {
        transform: translate(-2%, -62%) scaleX(0.72) rotate(-7deg);
        background-position: 150% 50%;
        opacity: 0.25;
      }
      20% {
        transform: translate(1%, -100%) scaleX(0.84) rotate(-12deg);
        opacity: 1;
      }
      45% {
        transform: translate(5%, -24%) scaleX(0.96) rotate(4deg);
        opacity: 0.88;
      }
      70% {
        transform: translate(4%, -72%) scaleX(1.02) rotate(-6deg);
        opacity: 0.95;
      }
      100% {
        transform: translate(-2%, -58%) scaleX(0.72) rotate(-7deg);
        background-position: -55% 50%;
        opacity: 0.25;
      }
    }

    @keyframes route-b-flow {
      0% {
        transform: translate(-3%, -34%) scaleX(0.68) rotate(8deg);
        background-position: 145% 50%;
        opacity: 0.18;
      }
      18% {
        transform: translate(1%, 2%) scaleX(0.8) rotate(14deg);
        opacity: 0.95;
      }
      42% {
        transform: translate(4%, -86%) scaleX(0.98) rotate(-9deg);
        opacity: 0.84;
      }
      66% {
        transform: translate(6%, -16%) scaleX(1.04) rotate(7deg);
        opacity: 0.9;
      }
      100% {
        transform: translate(-3%, -34%) scaleX(0.68) rotate(8deg);
        background-position: -60% 50%;
        opacity: 0.18;
      }
    }

    @keyframes sparkles-flow {
      0% {
        background-position: 120% 50%;
        transform: translateY(-58%) translateX(-3%) rotate(-5deg);
        opacity: 0.62;
      }
      12.5% {
        transform: translateY(-82%) translateX(-1%) rotate(-8deg);
        opacity: 0.86;
      }
      25% {
        transform: translateY(-92%) translateX(2%) rotate(-10deg);
        opacity: 0.95;
      }
      37.5% {
        transform: translateY(-82%) translateX(4%) rotate(-4deg);
        opacity: 0.9;
      }
      50% {
        transform: translateY(-58%) translateX(5%) rotate(2deg);
        opacity: 0.82;
      }
      62.5% {
        transform: translateY(-34%) translateX(3%) rotate(7deg);
        opacity: 0.9;
      }
      75% {
        transform: translateY(-24%) translateX(0%) rotate(9deg);
        opacity: 0.98;
      }
      87.5% {
        transform: translateY(-34%) translateX(-2%) rotate(4deg);
        opacity: 0.84;
      }
      100% {
        background-position: -60% 50%;
        transform: translateY(-58%) translateX(-3%) rotate(-5deg);
        opacity: 0.62;
      }
    }

    @keyframes stars-flow {
      0% {
        background-position: 135% 50%;
        transform: translateY(-42%) translateX(-5%) rotate(7deg);
        opacity: 0.74;
      }
      12.5% {
        transform: translateY(-69%) translateX(-1%) rotate(1deg);
        opacity: 0.92;
      }
      25% {
        transform: translateY(-96%) translateX(3%) rotate(-8deg);
        opacity: 1;
      }
      37.5% {
        transform: translateY(-69%) translateX(6%) rotate(2deg);
        opacity: 0.94;
      }
      50% {
        transform: translateY(-42%) translateX(7%) rotate(10deg);
        opacity: 0.85;
      }
      62.5% {
        transform: translateY(-15%) translateX(4%) rotate(13deg);
        opacity: 0.9;
      }
      75% {
        transform: translateY(-4%) translateX(0%) rotate(9deg);
        opacity: 1;
      }
      87.5% {
        transform: translateY(-15%) translateX(-3%) rotate(12deg);
        opacity: 0.88;
      }
      100% {
        background-position: -35% 50%;
        transform: translateY(-42%) translateX(-5%) rotate(7deg);
        opacity: 0.74;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Voce quis dizer <span class="glitter">https://find-my-saas.com<span class="route route-a" aria-hidden="true"></span><span class="route route-b" aria-hidden="true"></span><i></i></span> ?</h1>
    <p>Redirecionando em <span id="countdown">4</span> segundos. Se nada acontecer, <a href="https://find-my-saas.com">clique aqui</a>.</p>
  </main>
  <div class="footer-note">Um oferecimento #bolhasec</div>
  <script>
    var remainingSeconds = 4;
    var countdownElement = document.getElementById("countdown");

    window.setInterval(function () {
      remainingSeconds -= 1;

      if (remainingSeconds > 0) {
        countdownElement.textContent = String(remainingSeconds);
      }
    }, 1000);

    window.setTimeout(function () {
      window.location.replace("https://find-my-saas.com");
    }, 4000);
  </script>
</body>
</html>
